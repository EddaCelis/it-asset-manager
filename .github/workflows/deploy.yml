name: Deploy IT Asset Manager Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the latest source code from your GitHub repository onto the runner
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      # Step 2: Set up AWS CLI credentials using your repository environment secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      # Step 3: Securely SSH into the EC2 Server and orchestrate the multi-container build
      - name: SSH into EC2 Server and Launch Stack Components
        uses: appleboy/ssh-action@master
        with:
          host: 52.74.115.60
          username: intern-e
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/intern-e/it-asset-manager
            
            # Synchronize local server folder with the latest GitHub push
            git pull origin main
            
            # Gracefully stop old containers and remove conflicting networks
            docker compose down
            
            # Recompile the React frontend (Node) and FastAPI images, then launch the stack detached (-d)
            docker compose up --build -d