name: Deploy IT Asset Manager Stack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: SSH into EC2 Server and Launch Stack Components
        uses: appleboy/ssh-action@master
        with:
          host: 52.74.115.60
          username: intern-e
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/intern-e/it-asset-manager
            git pull origin main
            
            # 1. Clear out any active conflicting containers if they exist
            docker stop react-frontend fastapi-backend prod-postgres-db || true
            docker rm react-frontend fastapi-backend prod-postgres-db || true
            
            # 2. Ensure an internal bridge network exists for them to talk to each other
            docker network create asset-network || true
            
            # 3. Spin up the Database Layer
            docker run -d \
              --name prod-postgres-db \
              --network asset-network \
              -p 5432:5432 \
              -e POSTGRES_USER=admin \
              -e POSTGRES_PASSWORD=secretpass \
              -e POSTGRES_DB=model_registry \
              postgres:15-alpine
            
            # 4. Build and Launch the FastAPI Backend
            docker build -t it-asset-backend ./apps/backend
            docker run -d \
              --name fastapi-backend \
              --network asset-network \
              -p 8001:8001 \
              -e DATABASE_URL=postgresql://admin:secretpass@prod-postgres-db:5432/model_registry \
              it-asset-backend
            
            # 5. Build and Launch the React Frontend
            docker build -t it-asset-frontend ./apps/frontend
            docker run -d \
              --name react-frontend \
              --network asset-network \
              -p 3000:80 \
              it-asset-frontend