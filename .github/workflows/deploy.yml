name: Deploy IT Asset Manager to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Configure AWS Production Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1

    - name: Log in to Amazon ECR Registry
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Container Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: cw-scl-ojt
        IMAGE_TAG: latest
      run: |
        # Build the Docker image from our backend folder directory
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./apps/backend
        # Push the freshly compiled image to our cloud registry asset storage
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: SSH into EC2 Server and Launch Stack Components
      uses: appleboy/ssh-action@master
      with:
        host: 52.74.115.60
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Ensure a production PostgreSQL container is running on the host instance
          if [ ! "$(docker ps -q -f name=prod-postgres-db)" ]; then
            if [ "$(docker ps -aq -f name=prod-postgres-db)" ]; then
              docker rm -f prod-postgres-db
            fi
            docker run -d \
              --name prod-postgres-db \
              -p 5432:5432 \
              -e POSTGRES_USER=admin \
              -e POSTGRES_PASSWORD=secretpass \
              -e POSTGRES_DB=model_registry \
              --restart always \
              postgres:15-alpine
          fi

          # 2. Authenticate the host server engine with Amazon ECR
          aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 617163942417.dkr.ecr.ap-southeast-1.amazonaws.com

          # 3. Stop old app instances to ensure a clean port re-binding
          docker rm -f it-asset-app || true

          # 4. Pull down the latest build image and run it on your custom port assignment (8001)
          docker run -d \
            --name it-asset-app \
            -p 8001:8001 \
            --link prod-postgres-db:db-host \
            -e DATABASE_URL=postgresql://admin:secretpass@db-host:5432/model_registry \
            --restart always \
            617163942417.dkr.ecr.ap-southeast-1.amazonaws.com/cw-scl-ojt:latest