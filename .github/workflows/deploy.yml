name: Deploy IT Asset Manager to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: SSH into EC2 Server and Launch Stack Components
      uses: appleboy/ssh-action@master
      with:
        host: 52.74.115.60
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Step into the target deployment workspace
          cd /home/ubuntu

          # 2. Clone or update your project files onto the server
          if [ ! -d "it-asset-manager" ]; then
            git clone https://github.com/EddaCelis/it-asset-manager.git
          fi
          cd it-asset-manager
          git reset --hard
          git pull origin main

          # 3. Ensure the production PostgreSQL database container is alive
          if [ ! "$(docker ps -q -f name=prod-postgres-db)" ]; then
            if [ "$(docker ps -aq -f name=prod-postgres-db)" ]; then
              docker rm -f prod-postgres-db
            fi
            docker run -d \
              --name prod-postgres-db \
              -p 5432:5432 \
              -e POSTGRES_USER=admin \
              -e POSTGRES_PASSWORD=secretpass \
              -e POSTGRES_DB=model_registry \
              --restart always \
              postgres:15-alpine
          fi

          # 4. Clean up old app container builds to free your custom port
          docker rm -f it-asset-app || true
          docker rmi -f it-asset-app-image || true

          # 5. Build your app's Dockerfile directly on the EC2 engine
          docker build -t it-asset-app-image ./apps/backend

          # 6. Launch your application mapping your custom port assignment (8001)
          docker run -d \
            --name it-asset-app \
            -p 8001:8001 \
            --link prod-postgres-db:db-host \
            -e DATABASE_URL=postgresql://admin:secretpass@db-host:5432/model_registry \
            --restart always \
            it-asset-app-image