<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Asset Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        button { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        
        /* 1. Added custom styling for the Offboard / Delete Button */
        .btn-delete { background-color: #e74c3c; padding: 6px 12px; font-size: 14px; }
        .btn-delete:hover { background-color: #c0392b; }

        .search-box { margin: 20px 0; padding: 15px; background-color: #e8f4f8; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 Register New Employee Hardware Deployment</h2>
        <form id="assetForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="empName" required placeholder="e.g., Jane Celis">
            </div>
            <div class="form-group">
                <label>Corporate Department</label>
                <input type="text" id="dept" required placeholder="e.g., Finance">
            </div>
            <div class="form-group">
                <label>Assigned Laptop Hardware</label>
                <input type="text" id="laptop" required placeholder="e.g., MacBook Pro">
            </div>
            <button type="submit">Assign Assets & Save</button>
        </form>

        <div class="search-box">
            <label>🔍 Global Employee Registry Search</label>
            <input type="text" id="searchBar" placeholder="Type name, department, or hardware to filter instantly...">
        </div>

        <h2>Active Corporate Asset Deployments</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Employee Name</th>
                    <th>Department</th>
                    <th>Hardware Asset</th>
                    <th>Actions</th> <!-- 2. Added Actions column header -->
                </tr>
            </thead>
            <tbody id="assetTableBody"></tbody>
        </table>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/employees";

        async function fetchAssets(searchQuery = "") {
            const url = searchQuery ? `${API_URL}?search=${encodeURIComponent(searchQuery)}` : API_URL;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const tbody = document.getElementById("assetTableBody");
                tbody.innerHTML = "";
                data.forEach(item => {
                    // 3. Added a new <td> cell mapping the item ID to a delete trigger function
                    tbody.innerHTML += `<tr>
                        <td>${item.id}</td>
                        <td>${item.employee_name}</td>
                        <td>${item.department}</td>
                        <td>${item.assigned_laptop}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteAsset(${item.id})">🛑 Offboard</button>
                        </td>
                    </tr>`;
                });
            } catch (err) { console.error("Error fetching data:", err); }
        }

        // 4. Added JavaScript handler function to issue the HTTP DELETE request
        async function deleteAsset(id) {
            if (confirm(`Are you sure you want to offboard employee record #${id}?`)) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, {
                        method: "DELETE"
                    });
                    if (res.ok) {
                        fetchAssets(); // Refresh table view records instantly
                    } else {
                        alert("Failed to delete the asset registry record.");
                    }
                } catch (err) {
                    console.error("Error deleting asset:", err);
                }
            }
        }

        document.getElementById("assetForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                employee_name: document.getElementById("empName").value,
                department: document.getElementById("dept").value,
                assigned_laptop: document.getElementById("laptop").value,
                is_onboarding_complete: true
            };
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            document.getElementById("assetForm").reset();
            fetchAssets();
        });

        document.getElementById("searchBar").addEventListener("input", (e) => {
            fetchAssets(e.target.value);
        });

        window.onload = () => fetchAssets();
    </script>
</body>
</html>
